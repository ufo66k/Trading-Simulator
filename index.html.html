<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UFOX Trading — Idle Game</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#060a0f;overflow-x:hidden}
.g{font-family:'Share Tech Mono',monospace;background:#060a0f;color:#c8d8e8;padding:8px;position:relative;overflow:hidden;max-width:480px;margin:0 auto;min-height:100vh}
.corner{position:absolute;width:10px;height:10px;z-index:10}
.corner.tl{top:3px;left:3px;border-top:1px solid #00aaff;border-left:1px solid #00aaff}
.corner.tr{top:3px;right:3px;border-top:1px solid #00aaff;border-right:1px solid #00aaff}
.corner.bl{bottom:3px;left:3px;border-bottom:1px solid #00aaff;border-left:1px solid #00aaff}
.corner.br{bottom:3px;right:3px;border-bottom:1px solid #00aaff;border-right:1px solid #00aaff}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;padding-bottom:5px;border-bottom:1px solid #ffffff11}
.header-left .ticker{font-family:'Orbitron',monospace;font-size:11px;font-weight:900;color:#00aaff;letter-spacing:2px}
.header-left{display:flex;flex-direction:column;gap:2px}
.whale-row{display:flex;align-items:center;gap:6px}
.regime-lbl{font-size:6px;color:#ffffff33;letter-spacing:1px}
.price-right{text-align:right}
.price-big{font-family:'Orbitron',monospace;font-size:18px;font-weight:900}
.price-big.up{color:#00dd88}.price-big.dn{color:#ff4455}.price-big.mania{color:#ffd700;animation:mpulse .4s ease-in-out infinite alternate}
@keyframes mpulse{from{color:#ffd700}to{color:#ff8800}}
.price-chg{font-size:8px;letter-spacing:1px}
.price-chg.up{color:#00dd88}.price-chg.dn{color:#ff4455}.price-chg.mania{color:#ffd700}
.lvl-bar{display:flex;align-items:center;gap:6px;background:#0a1520;border:1px solid #00aaff22;padding:5px 8px;margin-bottom:5px;cursor:pointer;user-select:none;-webkit-user-select:none;min-height:36px;border-radius:3px}
.lvl-bar.ready{border-color:#00dd8888;animation:rpulse 1.2s ease-in-out infinite alternate}
@keyframes rpulse{from{border-color:#00dd8833}to{border-color:#00dd88cc}}
.lvl-lbl{font-family:'Orbitron',monospace;font-size:6px;color:#00aaff;letter-spacing:1px;white-space:nowrap}
.pw{flex:1;height:6px;background:#ffffff0a;border:1px solid #ffffff11;border-radius:3px}
.pf{height:100%;transition:width 0.3s;background:#00aaff;border-radius:3px}
.pt{font-size:6px;color:#ffffff55;white-space:nowrap}
.lvl-hint{font-size:7px;color:#00dd88;letter-spacing:1px;white-space:nowrap;display:none}
.lvl-hint.show{display:block;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}
.whale-badge{font-size:6px;padding:1px 5px;border:1px solid;letter-spacing:1px;display:none;border-radius:2px}
.whale-badge.show{display:inline-block}
.whale-badge.sm{color:#4488ff;border-color:#4488ff44;background:#4488ff11}
.whale-badge.md{color:#aa44ff;border-color:#aa44ff44;background:#aa44ff11}
.whale-badge.lg{color:#ffd700;border-color:#ffd70044;background:#ffd70011}
.whale-badge.mega{color:#ff6600;border-color:#ff660044;background:#ff660011;animation:wp 1s ease-in-out infinite alternate}
@keyframes wp{from{border-color:#ff660033}to{border-color:#ff6600aa}}
.chart-wrap{background:#080e18;border:1px solid #ffffff0d;position:relative;margin-bottom:5px;overflow:hidden;touch-action:none;border-radius:3px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:5px}
.sb{background:#0a1520;border:1px solid #ffffff0d;border-top:2px solid #00aaff33;padding:4px 6px;border-radius:3px}
.sl2{font-size:5px;color:#ffffff44;letter-spacing:1px;margin-bottom:1px}
.sv{font-size:10px;font-family:'Orbitron',monospace;font-weight:700;color:#c8d8e8}
.sv.pos{color:#00dd88}.sv.neg{color:#ff4455}
.trade-section{display:flex;flex-direction:column;gap:5px}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.tb{padding:14px 5px;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;border:2px solid;transition:background 0.2s;border-radius:3px;touch-action:manipulation}
.tb.buy{border-color:#00dd88;color:#00dd88;background:#00dd8811}
.tb.buy.up{background:#00dd8844!important}
.tb.sell{border-color:#ff4455;color:#ff4455;background:#ff445511}
.tb.sell.dn{background:#ff445544!important}
.tb:disabled{opacity:0.2;cursor:not-allowed}
.tb .sub{display:block;font-size:7px;font-weight:400;letter-spacing:1px;margin-top:3px;opacity:0.7}
.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.tb.cls{background:#ffffff08;border:1px solid #ffffff33;color:#ffffff88;font-size:9px;letter-spacing:1px;padding:12px;border-radius:3px}
.tb.tpsl{background:#ffd70011;border:1px solid #ffd70055;color:#ffd700;font-size:9px;letter-spacing:1px;padding:12px;border-radius:3px}
.tb.tpsl.active{background:#ffd70033;border-color:#ffd700}
.pos-box{background:#0a1520;border:1px solid #ffffff0d;padding:8px;border-radius:3px}
.pos-ttl{font-size:7px;color:#ffffff44;letter-spacing:2px;margin-bottom:5px}
.pos-none{font-size:9px;color:#ffffff22;text-align:center;padding:8px 0;letter-spacing:1px}
.pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.pr{display:flex;justify-content:space-between;font-size:8px;padding:2px 0}
.pr .l{color:#ffffff44}.pr .v{font-weight:700}
.pr .v.long{color:#00dd88}.pr .v.short{color:#ff4455}
.pr .v.pos{color:#00dd88}.pr .v.neg{color:#ff4455}
.console{background:#040810;border:1px solid #00aaff22;border-left:2px solid #00aaff55;padding:5px 8px;font-size:7px;color:#ffffff33;letter-spacing:0.5px;height:70px;overflow-y:auto;border-radius:3px}
.console::-webkit-scrollbar{width:2px}.console::-webkit-scrollbar-thumb{background:#00aaff33}
.console .le{margin-bottom:2px;line-height:1.4}
.console .le.pos{color:#00dd8899}.console .le.neg{color:#ff445599}.console .le.info{color:#00aaff88}.console .le.evt{color:#ffaa00aa}.console .le.extreme{color:#ff6600cc;font-weight:bold}.console .le.news{color:#ff88ffcc;font-weight:bold}.console .le.whale{color:#ffd700aa}.console .le.rescue{color:#00ffaacc;font-weight:bold}.console .le.mania{color:#ffd700;font-weight:bold;animation:blink .5s step-end infinite}
.bottom-panel{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:5px}
.rbox{background:#0a1520;border:1px solid #ffffff0d;border-top:2px solid #00aaff33;padding:8px;border-radius:3px}
.rt{font-size:7px;color:#00aaff77;letter-spacing:2px;margin-bottom:5px;display:flex;align-items:center;gap:4px}
.rt::before{content:'';display:inline-block;width:4px;height:4px;background:#00aaff;clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%)}
.sr{display:flex;justify-content:space-between;font-size:7px;margin-bottom:3px}
.sr .l{color:#ffffff33}.sr .v{color:#c8d8e8;font-weight:700}
.upg-s{max-height:130px;overflow-y:auto}
.upg-s::-webkit-scrollbar{width:2px}.upg-s::-webkit-scrollbar-thumb{background:#00aaff33}
.ubtn{width:100%;background:#060a0f;border:1px solid #00aaff18;color:#c8d8e8;font-family:'Share Tech Mono',monospace;font-size:7px;padding:6px;cursor:pointer;margin-bottom:3px;text-align:left;display:block;touch-action:manipulation;border-radius:2px}
.ubtn:active{background:#00aaff15}
.ubtn[disabled]{opacity:0.22;cursor:not-allowed}
.ubtn.can{border-color:#00aaff44}
.ubtn-name{font-size:7px;color:#c8d8e8;letter-spacing:0.5px}
.ubtn-cost{font-size:7px;color:#ffd700;float:right}
.ubtn-desc{font-size:7px;color:#ffffff55;display:block;margin-top:2px;clear:both;line-height:1.3}
.gameover{position:fixed;inset:0;background:rgba(6,10,15,0.97);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:50;padding:20px}
.gameover.show{display:flex}
.go-ttl{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#ff4455;letter-spacing:3px;margin-bottom:8px;text-align:center}
.go-sub{font-size:8px;color:#ffffff55;letter-spacing:2px;margin-bottom:14px;text-align:center}
.go-st{background:#0a1520;border:1px solid #ff445533;padding:12px 20px;margin-bottom:14px;text-align:center;width:100%;max-width:280px;border-radius:3px}
.go-btn{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;color:#00aaff;background:#00aaff15;border:1px solid #00aaff;padding:12px 24px;cursor:pointer;letter-spacing:2px;touch-action:manipulation;border-radius:3px}
.lvl-ov{position:fixed;inset:0;background:rgba(0,170,255,0.06);z-index:40;display:none;align-items:center;justify-content:center;pointer-events:none}
.lvl-ov.show{display:flex;animation:lvlf 1.4s forwards}
@keyframes lvlf{0%{opacity:0}20%{opacity:1}80%{opacity:1}100%{opacity:0}}
.lvl-txt{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#00aaff;letter-spacing:4px;text-align:center;line-height:1.5}
.mania-overlay{position:fixed;inset:0;background:rgba(255,215,0,0.04);z-index:3;pointer-events:none;display:none}
.mania-overlay.show{display:block;animation:mf .6s ease-in-out infinite alternate}
@keyframes mf{from{background:rgba(255,215,0,0.02)}to{background:rgba(255,140,0,0.07)}}
.scanline{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,170,255,0.003) 3px,rgba(0,170,255,0.003) 4px);pointer-events:none;z-index:2}
.chart-news{position:absolute;top:14px;left:5px;max-width:175px;background:rgba(4,8,18,0.96);border:1px solid;padding:5px 7px;z-index:20;display:none;pointer-events:none;border-radius:3px}
.chart-news.bull{border-color:#00dd8888}.chart-news.bear{border-color:#ff445588}.chart-news.rescue{border-color:#00ffaa88}.chart-news.mania{border-color:#ffd70088}
.chart-news.show{display:block;animation:ns .3s ease-out}
@keyframes ns{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.cn-site{font-size:6px;letter-spacing:1px;margin-bottom:2px}
.cn-site.bull{color:#00dd8888}.cn-site.bear{color:#ff445588}.cn-site.rescue{color:#00ffaa88}.cn-site.mania{color:#ffd700}
.cn-headline{font-family:'Orbitron',monospace;font-size:6px;font-weight:700;color:#c8d8e8;line-height:1.3;margin-bottom:2px;letter-spacing:0.3px}
.cn-impact{font-size:7px;font-weight:700;letter-spacing:1px}
.cn-impact.bull{color:#00dd88}.cn-impact.bear{color:#ff4455}.cn-impact.rescue{color:#00ffaa}.cn-impact.mania{color:#ffd700}
</style>
</head>
<body>
<div class="g" id="game">
<div class="scanline"></div>
<div class="mania-overlay" id="mania-overlay"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div class="header">
  <div class="header-left">
    <div class="whale-row">
      <div class="ticker" id="ticker-lbl">UFOX/USDT</div>
      <div class="whale-badge" id="whale-badge">WHALE</div>
    </div>
    <div class="regime-lbl" id="regime-lbl">MARCHE: NEUTRE</div>
  </div>
  <div class="price-right">
    <div class="price-big up" id="price-disp">150.00</div>
    <div class="price-chg up" id="price-chg">+0.000%</div>
  </div>
</div>

<div class="lvl-bar" id="lvl-bar" onclick="tryLevelUp()">
  <div class="lvl-lbl" id="lvl-lbl">NV1 — PIONNIER</div>
  <div class="pw"><div class="pf" id="pf" style="width:0%"></div></div>
  <div class="pt" id="pt">$1k/$5k</div>
  <div class="lvl-hint" id="lvl-hint">▶ TAP!</div>
</div>

<div class="chart-wrap" id="cwrap">
  <canvas id="cv"></canvas>
  <div class="chart-news" id="chart-news">
    <div class="cn-site" id="cn-site">CRYPTOFLASH</div>
    <div class="cn-headline" id="cn-headline">...</div>
    <div class="cn-impact" id="cn-impact">+150%</div>
  </div>
</div>

<div class="stats-row">
  <div class="sb"><div class="sl2">CAPITAL</div><div class="sv pos" id="cap-d">$1,000</div></div>
  <div class="sb"><div class="sl2">P&L</div><div class="sv" id="pnl-d">$0</div></div>
  <div class="sb"><div class="sl2">TRADES</div><div class="sv" id="tr-d">0</div></div>
  <div class="sb"><div class="sl2">WIN%</div><div class="sv" id="wr-d">-</div></div>
</div>

<div class="trade-section">
  <div class="btn-row">
    <button class="tb buy" id="buy-btn" onclick="openTrade('long')">BUY<span class="sub">LONG ▲</span></button>
    <button class="tb sell" id="sell-btn" onclick="openTrade('short')">SELL<span class="sub">SHORT ▼</span></button>
  </div>
  <div class="bottom-row">
    <button class="tb cls" id="cls-btn" onclick="closeTrade()" disabled>FERMER</button>
    <button class="tb tpsl" id="tpsl-btn" onclick="toggleTPSL()">TP / SL</button>
  </div>
  <div class="pos-box">
    <div class="pos-ttl">POSITION</div>
    <div id="pos-content"><div class="pos-none">— AUCUNE —</div></div>
  </div>
  <div class="console" id="console-log"><div class="le info">&gt; TERMINAL PRET.</div></div>
</div>

<div class="bottom-panel">
  <div class="rbox">
    <div class="rt">STATS</div>
    <div class="sr"><span class="l">NIVEAU</span><span class="v" id="s-lvl">1</span></div>
    <div class="sr"><span class="l">OBJECTIF</span><span class="v" id="s-obj">$5,000</span></div>
    <div class="sr"><span class="l">BONUS</span><span class="v" id="s-bonus">+0%</span></div>
    <div class="sr"><span class="l">FRAIS</span><span class="v" id="s-fee">0.10%</span></div>
    <div class="sr"><span class="l">SL AUTO</span><span class="v" id="s-sl">OFF</span></div>
    <div class="sr"><span class="l">SIGNAL AI</span><span class="v" id="s-ai">OFF</span></div>
  </div>
  <div class="rbox">
    <div class="rt">UPGRADES</div>
    <div class="upg-s" id="upg-list"></div>
  </div>
</div>

<div class="gameover" id="gameover">
  <div class="go-ttl">LIQUIDÉ</div>
  <div class="go-sub">CAPITAL INSUFFISANT</div>
  <div class="go-st" id="go-st"></div>
  <button class="go-btn" onclick="resetGame()">RECOMMENCER</button>
</div>
<div class="lvl-ov" id="lvl-ov"><div class="lvl-txt" id="lvl-txt">NIVEAU 2</div></div>
</div>

<script>
const LEVELS=[{n:1,start:1000,goal:5000,name:"PIONNIER"},{n:2,start:10000,goal:25000,name:"TRADER"},{n:3,start:25000,goal:50000,name:"ANALYSTE"},{n:4,start:50000,goal:100000,name:"GESTIONNAIRE"},{n:5,start:100000,goal:1000000,name:"LEGENDE"}];
const UPGRADES=[{id:"b2",name:"BONUS +2%",desc:"Trade gagnant +2% capital",cost:1500,fn:()=>{G.bonus+=0.02}},{id:"fe5",name:"FRAIS 0.05%",desc:"Frais réduits à 0.05%",cost:3000,fn:()=>{G.fee=0.0005}},{id:"sl",name:"STOP-LOSS AUTO",desc:"Coupe à -5% automatiquement",cost:5000,fn:()=>{G.sl=true}},{id:"b5",name:"BONUS +5%",desc:"Trade gagnant +5% capital",cost:15000,fn:()=>{G.bonus+=0.05}},{id:"ai1",name:"SIGNAL AI v1",desc:"Flèche de tendance sur le graphique",cost:25000,fn:()=>{G.ai=1}},{id:"fe0",name:"ZERO FRAIS",desc:"Supprime toutes les commissions",cost:40000,fn:()=>{G.fee=0}},{id:"b10",name:"BONUS +10%",desc:"Trade gagnant +10% capital",cost:80000,fn:()=>{G.bonus+=0.10}},{id:"ai2",name:"SIGNAL AI v2",desc:"Signal IA haute précision",cost:150000,fn:()=>{G.ai=2}},{id:"b20",name:"BONUS +20%",desc:"Bonus ultime +20% par win",cost:400000,fn:()=>{G.bonus+=0.20}}];
const NEWS_EVENTS=[{prob:0.010,site:"CRYPTOFLASH",headline:"Elon Musk achète massivement du UFOX",impact:"+150%",mult:2.50,type:"bull"},{prob:0.008,site:"COINDESK PRO",headline:"La Fed injecte $500Mds — crypto en feu",impact:"+80%",mult:1.80,type:"bull"},{prob:0.009,site:"BLOOMBERG X",headline:"BlackRock lance ETF UFOX approuvé SEC",impact:"+120%",mult:2.20,type:"bull"},{prob:0.007,site:"CRYPTOFLASH",headline:"Apple intègre UFOX dans Apple Pay worldwide",impact:"+200%",mult:3.00,type:"bull"},{prob:0.008,site:"COINDESK PRO",headline:"La Chine légalise crypto — UFOX leader",impact:"+90%",mult:1.90,type:"bull"},{prob:0.007,site:"REUTERS",headline:"MicroStrategy achète 500k UFOX",impact:"+60%",mult:1.60,type:"bull"},{prob:0.010,site:"FT DIGITAL",headline:"Hack massif protocole UFOX — $2Mds volés",impact:"-70%",mult:0.30,type:"bear"},{prob:0.009,site:"BLOOMBERG X",headline:"SEC interdit UFOX aux États-Unis",impact:"-60%",mult:0.40,type:"bear"},{prob:0.008,site:"CRYPTOFLASH",headline:"Whale dumpe 40% du supply UFOX",impact:"-55%",mult:0.45,type:"bear"},{prob:0.007,site:"COINDESK PRO",headline:"FTX 2.0 — échange insolvable",impact:"-65%",mult:0.35,type:"bear"},{prob:0.008,site:"FT DIGITAL",headline:"Rug pull UFOX — fondateurs fuient $1Mds",impact:"-80%",mult:0.20,type:"bear"}];
const PRICE_EVENTS=[{prob:0.080,name:"PUMP",mult:1.05,type:"pump"},{prob:0.060,name:"BREAKOUT",mult:1.10,type:"pump"},{prob:0.040,name:"WHALE PUMP",mult:1.22,type:"pump"},{prob:0.025,name:"MOON SHOT",mult:1.45,type:"pump"},{prob:0.080,name:"DUMP",mult:0.95,type:"crash"},{prob:0.060,name:"BREAKDOWN",mult:0.90,type:"crash"},{prob:0.040,name:"FLASH CRASH",mult:0.78,type:"crash"},{prob:0.025,name:"BEAR ATK",mult:0.60,type:"crash"},{prob:0.022,name:"MEGA PUMP",mult:1.65,type:"extreme"},{prob:0.015,name:"SUPERNOVA",mult:2.10,type:"extreme"},{prob:0.008,name:"BIG BANG",mult:2.90,type:"extreme"},{prob:0.022,name:"BLACK SWAN",mult:0.38,type:"extreme"},{prob:0.015,name:"EXTINCTION",mult:0.20,type:"extreme"},{prob:0.008,name:"HYPERCRASH",mult:0.08,type:"extreme"}];
const RESCUE_NEWS=[{site:"CRYPTOFLASH",headline:"Achat massif — plancher défendu",impact:"+150%"},{site:"COINDESK PRO",headline:"Fonds souverain entre au capital UFOX",impact:"+140%"},{site:"BLOOMBERG X",headline:"Short squeeze — bears liquidés",impact:"+160%"},{site:"REUTERS",headline:"Buyback massif fondation UFOX",impact:"+130%"},{site:"FT DIGITAL",headline:"Support majeur — rebond violent",impact:"+120%"}];
const WHALE_TIERS=[{min:50000,max:200000,label:"SHRIMP",cls:"sm",impact:0.002},{min:200000,max:1000000,label:"DOLPHIN",cls:"md",impact:0.005},{min:1000000,max:5000000,label:"WHALE",cls:"lg",impact:0.012},{min:5000000,max:Infinity,label:"MEGA WHALE",cls:"mega",impact:0.025}];
let G={cap:1000,lvl:0,trades:0,wins:0,bonus:0,fee:0.001,sl:false,ai:0,bought:new Set(),pos:null,sessionPnl:0,logs:[],levelReady:false};
let dead=false,price=150,prevPrice=150;
let candles=[],partial=null,tickC=0;const TPB=3;
let regime='neutral',regTick=0,aiArrow=null,trend='neutral';
let liquidity=1,liqTick=0,newsHideTimer=null,lastEventTime=0;const EVT_CD=5000;
let underFiftyStart=null,rescueFired=false,postCorrection=0,maniaActive=false;
const RANGE_MID=150,RANGE_LO=100,RANGE_HI=200;
let tpslActive=false,tpPrice=null,slPrice=null,dragging=null;
let chartMinP=90,chartMaxP=210,chartDrawH=186;
function getWT(){for(const t of WHALE_TIERS)if(G.cap>=t.min&&G.cap<t.max)return t;return null;}
function canFire(){return Date.now()-lastEventTime>=EVT_CD;}
function markEvt(){lastEventTime=Date.now();}
function stepPrice(){
  const now=Date.now();
  regTick--;if(regTick<=0){if(!maniaActive){const r=Math.random();regime=r<0.38?'bull':r<0.76?'bear':'neutral';}regTick=8+Math.floor(Math.random()*16);}
  liqTick++;if(liqTick%20===0){liquidity=0.5+Math.random()*1.0;if(liquidity<0.7)addLog('LIQUIDITE FAIBLE','evt');}
  if(maniaActive){
    if(price>=1000){maniaActive=false;document.getElementById('mania-overlay').classList.remove('show');document.getElementById('ticker-lbl').textContent='UFOX/USDT';regime='bear';regTick=30;postCorrection=45;addLog('MANIA TERMINEE — CORRECTION','extreme');showNR('CRYPTOFLASH','UFOX MANIA terminée — vente massive','-60%','bear');}
    else{prevPrice=price;price=Math.max(price,price*(1+0.028+Math.random()*0.018+(Math.random()-0.5)*0.018));trend='up';buildC();return;}
  }

  const bb=document.getElementById('buy-btn'),sb=document.getElementById('sell-btn');if(!G.pos){bb.className='tb buy'+(trend==='up'?' up':'');sb.className='tb sell'+(trend==='dn'?' dn':'');}
  const pc=document.getElementById('pos-content');
  if(G.pos){const{dir,entry,openCap}=G.pos;let pnlL=openCap*(price-entry)/entry*(dir==='long'?1:-1);if(pnlL>0)pnlL+=openCap*G.bonus;const c2=pnlL>=0?'pos':'neg';pc.innerHTML='<div class="pos-grid"><div class="pr"><span class="l">DIR</span><span class="v '+dir+'">'+(dir==='long'?'▲ LONG':'▼ SHORT')+'</span></div><div class="pr"><span class="l">ENTREE</span><span class="v">'+entry.toFixed(1)+'</span></div><div class="pr"><span class="l">TAILLE</span><span class="v">'+fmt(openCap)+'</span></div><div class="pr"><span class="l">PNL LIVE</span><span class="v '+c2+'">'+(pnlL>=0?'+':'')+pnlL.toFixed(0)+'$</span></div></div>';bb.disabled=true;sb.disabled=true;document.getElementById('cls-btn').disabled=false;}
  else{pc.innerHTML='<div class="pos-none">— AUCUNE —</div>';bb.disabled=dead;sb.disabled=dead;document.getElementById('cls-btn').disabled=true;}
}
function loop(){if(dead)return;stepPrice();checkASL();checkTPSL();checkState();drawChart();updateUI();renderUpgrades();}
addLog('TERMINAL PRET — BON TRADE.','info');renderUpgrades();updateUI();
setInterval(loop,400);
</script>
